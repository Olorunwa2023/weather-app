<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <div class="container">
        <img id="weatherIcon" alt="">
        <i class="wi wi-night-sleet"></i>
        
        <h1>Weather App</h1>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name">
            <button id="searchBtn">
                Search
            </button>
        </div>

        <div id="weatherCard" class="weather-card">
            <img id="weatherIcon" alt="Weather Icon">

            <h2 id="city"></h2>

            <p id="temperature"></p>

            <p id="description"></p>

            <p id="humidity"></p>

            <p id="wind"></p>

        </div>

        <h2>5-Day Forecast</h2>

        <div id="forecastContainer"></div>





    </div>

    <script src="weatherscript.js"></script>
    <script src="weatherscript2.js"></script>
    
</body>
</html>
